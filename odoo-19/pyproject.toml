# Project tool configuration.
#
# ruff  — fast surface lint + formatter (https://docs.astral.sh/ruff/)
# pylint — deep semantic analysis; covers what ruff cannot do
#          (duplicate-code, used-before-assignment, attribute-defined-outside-init, …)

[tool.ruff]
# Odoo has longer lines — domain expressions, SQL, computed field bodies.
line-length = 120
target-version = "py312"
# pre-commit passes files explicitly; without force-exclude ruff would ignore
# extend-exclude (migrations/upgrades/e2e would still be linted/formatted).
force-exclude = true
extend-exclude = [
    "extra-addons/*/migrations",
    "extra-addons/*/upgrades",
    "bak-addons",
    "_local",
    "tests/e2e",
    ".aigiscode",
    ".pipeline",
    "screenshots",
]

[tool.ruff.lint]
# Conservative set — we want upgrade-friendly, not a revolution.
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes (unused imports/vars, undefined names)
    "W",   # pycodestyle warnings
    "I",   # isort (import order)
    "B",   # flake8-bugbear (likely bugs)
    "UP",  # pyupgrade (modern Python idioms)
    "C4",  # comprehensions
    "PIE", # misc lints
    "RUF", # ruff-specific rules
]
ignore = [
    # Odoo specifics that cannot be "fixed":
    "E501",   # line too long — Odoo domains and long SQL strings
    "B008",   # function call in default arg — Odoo uses fields.Char(default=lambda...)
    "B904",   # raise ... from err — Odoo UserError does not make sense to chain
    "UP007",  # `Optional[X]` → `X | None` — Odoo inherently has dict types where UP007 is noise
    "UP009",  # `# coding: utf-8` shebang — Odoo legacy in older modules, we don't refactor it
    "RUF012", # mutable class attrs — Odoo _columns / fields style
    # Slovak strings and comments — diacritics trigger:
    "RUF001", # ambiguous unicode in string (false-positive on ž/š/č/ť/...)
    "RUF002", # ambiguous unicode in docstring
    "RUF003", # ambiguous unicode in comment
    # Style we do not want to enforce:
    "E731",   # lambda assignment (due to onchange/default callbacks)
]

[tool.ruff.lint.per-file-ignores]
# Manifest files are dict, not code:
"__manifest__.py" = ["B018", "F401"]
# Odoo __init__.py must re-export `controllers`, `models`, etc. — F401 would report "unused":
"extra-addons/**/__init__.py" = ["F401"]
# Tests can have long strings + assert helpers + fixture re-imports:
"tests/**/*.py" = ["B011", "F401", "F811"]
# Migrations have dynamically generated code:
"**/migrations/**/*.py" = ["F", "E", "B"]
"**/upgrades/**/*.py" = ["F", "E", "B"]

[tool.ruff.lint.isort]
known-first-party = ["odoo", "odoo_e2e"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

[tool.ruff.format]
# ruff format is drop-in replacement for black (same formatting).
quote-style = "double"
indent-style = "space"
docstring-code-format = false

# =============================================================================
# Pylint — deep semantic analysis
# Docs: https://pylint.readthedocs.io/en/stable/user_guide/configuration/
# =============================================================================

[tool.pylint.main]
# Parallel run (0 = automatically according to the number of CPU cores)
jobs = 0
# Directories that pylint skips
ignore = [".git", "__pycache__", ".venv", "venv", "build", "dist"]
ignore-patterns = [
    "^\\.tox$",
    "^\\.mypy_cache$",
    "^\\.pytest_cache$",
    "^node_modules$",
    "^__manifest__\\.py$",
]
# Migrations and upgrades are dynamically generated — same logic as ruff extend-exclude
ignore-paths = [
    ".*/migrations/.*",
    ".*/upgrades/.*",
]
# Reports off — only errors/warnings (suitable for CI and pre-commit)
reports = false
score = false
# Inter-run results cache
persistent = true

[tool.pylint."messages control"]
# Odoo is dynamic (fields, env, models…) — Odoo-friendly set of disables.
disable = [
    # Often redundant in Odoo module repos
    "missing-module-docstring",
    "missing-class-docstring",
    "missing-function-docstring",
    # Odoo methods must have "self" even if unused, or the API dictates the signature
    "unused-argument",
    # Odoo style: many short names (id, ids, cr, uid, ctx)
    "invalid-name",
    # Odoo has many attributes/fields → false positives
    "too-few-public-methods",
    "too-many-public-methods",
    "too-many-ancestors",
    # ORM methods can be large (create/write/action_*) — track with review, not pylint
    "too-many-locals",
    "too-many-branches",
    "too-many-statements",
    "too-many-arguments",
    "too-many-positional-arguments",
    "too-many-return-statements",
    # Controllers or modules with multiple endpoints tend to be long—monitor them via code reviews, not Pylint.
    "too-many-lines",
    # Odoo: Methods prefixed with `_` follow the "private" convention (e.g., `bus._sendone`), not the Python "protected" convention.
    "protected-access",
    # Odoo controllers commonly use lazy imports within methods (markupsafe, reportlab…).
    "import-outside-toplevel",
    # Odoo sometimes uses broad exceptions (e.g., during integrations)
    "broad-exception-caught",
    # Some pylint versions are hyper-strict with f-string and logging
    "logging-fstring-interpolation",
    # Odoo imports a lot of things in __init__.py / __manifest__ context
    "wrong-import-order",
    # https://pylint.readthedocs.io/en/stable/user_guide/messages/messages_overview.html
    "line-too-long",
    # Odoo has import cycles in the __init__.py tree
    "cyclic-import",
    # Odoo dynamically creates attributes via env, fields, etc.
    "no-member",
    # Odoo BaseModel has abstract methods that we don't always overwrite
    "abstract-method",

    # --- Overlap with ruff (pyproject.toml select: E,F,W,I,B,UP,C4,PIE) ---
    # These checks are done by ruff check — we leave them exclusively to it,
    # so they do not appear twice.
    "unused-import",                  # ruff F401
    "unused-variable",                # ruff F841
    "undefined-variable",             # ruff F821
    "unused-wildcard-import",         # ruff F405
    "wildcard-import",                # ruff F403
    "reimported",                     # ruff F811
    "dangerous-default-value",        # ruff B006
    "consider-using-f-string",        # ruff UP032
    "unnecessary-comprehension",      # ruff C4
    "unnecessary-pass",               # ruff PIE790
    "pointless-statement",            # ruff B018
    "f-string-without-interpolation", # ruff F541
    "trailing-newlines",              # ruff W391
    "missing-final-newline",          # ruff W292 / end-of-file-fixer
    "unnecessary-semicolon",          # ruff E702/E703
    "bad-indentation",                # ruff E111 + ruff-format
    "multiple-statements",            # ruff E701
]

[tool.pylint.typecheck]
# Key to Odoo 19: the `odoo` module is not a classic package → import analysis might fail.
ignored-modules = ["odoo"]
# Tolerate dynamically generated members (fields.*, api.*, models.*, _ etc.)
generated-members = [
    "odoo.*",
    "openerp.*",
    "models.*",
    "fields.*",
    "api.*",
]

[tool.pylint.format]
# Odoo has longer lines (domains, SQL, long strings) — aligned with ruff line-length
max-line-length = 120

[tool.pylint.design]
max-args = 10
max-attributes = 20
max-locals = 25
max-branches = 20
max-statements = 80

[tool.pylint.basic]
# Allowed short names typical for Odoo / Python
good-names = ["i", "j", "k", "ex", "pk", "id", "ids", "cr", "uid", "ctx", "env", "_", "x", "y"]
# Ignore "dummy" variables
dummy-variables-rgx = "^(_|unused_|dummy_)"

[tool.pylint.similarities]
# Duplicate-code detection — this is a unique capability of pylint (ruff cannot do this)
min-similarity-lines = 8
ignore-imports = true
ignore-signatures = true
ignore-comments = true
ignore-docstrings = true

[tool.pylint.variables]
# Odoo translations: '_' is standard, let pylint not report "undefined"
additional-builtins = ["_"]

[tool.pylint.logging]
# Odoo uses logging.getLogger(__name__)
logging-modules = ["logging"]
