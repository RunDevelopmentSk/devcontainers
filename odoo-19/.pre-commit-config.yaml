# Pre-commit hooks — automatic lint and formatting on every commit.
#
# Installation (once after clone; if using a devcontainer, it installs automatically - see devcontainer.json > "postCreateCommand"):
#   pip install pre-commit
#   pre-commit install
#
# Manual run for staged files:
#   pre-commit run
#
# Manual run for staged files, only the hook with a given id or alias:
#   pre-commit run prettier
#
# Manual run for specified files:
#   pre-commit run --files foo.xml bar.py
#
# Manual run for all modified (staged + unstaged) files:
#   pre-commit run --files $(git diff HEAD --name-only)
#
# Manual run for all files:
#   pre-commit run --all-files
#
# Emergency bypass of hooks during commit (not recommended for regular use):
#   git commit --no-verify
#
# Manual update of hooks to the latest versions:
#   pre-commit autoupdate

repos:
    # 1) Basic generic hooks
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v5.0.0
      hooks:
          - id: trailing-whitespace
            exclude: '\.md$|\.csv$'
          - id: end-of-file-fixer
            exclude: '\.csv$'
          - id: check-yaml
          - id: check-json
            # devcontainer.json is JSONC (JSON with Comments) — comments are valid, but standard JSON parser rejects them
            exclude: '^\.aigiscode/|^\.devcontainer/devcontainer\.json$'
          - id: check-toml
          - id: check-merge-conflict
          - id: check-added-large-files
            args: ["--maxkb=1024"]
          - id: mixed-line-ending
            args: ["--fix=lf"]
            exclude: '\.bat$|\.cmd$'

    # 2) Ruff (Python) — lint + formatting.
    # `ruff` (lint) runs BEFORE `ruff-format` because --fix can modify code (e.g. import
    # order). Rules are in pyproject.toml. By default, it runs only on staged files,
    # so existing issues block only when that specific file is modified (gradual cleanup).
    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.7.4
      hooks:
          - id: ruff
            args: [--fix]
            files: ^extra-addons/
          - id: ruff-format
            files: ^extra-addons/

    # 2b) Pylint (Python) — deep semantic analysis that ruff doesn't do (duplicate-code,
    # used-before-assignment, attribute-defined-outside-init, refactor tips). Overlap
    # with ruff is disabled in pyproject.toml ([tool.pylint."messages control"]).
    # Config: pyproject.toml [tool.pylint.*] — pylint finds it automatically.
    # `language: system` → pylint from devcontainer (it sees Odoo environment).
    - repo: local
      hooks:
          - id: pylint
            name: pylint (odoo addons)
            entry: pylint
            language: system
            types: [python]
            files: ^extra-addons/
            # pylint `ignore-paths` is not applied to explicitly passed files (pre-commit
            # always passes paths), therefore migrations/upgrades are excluded directly here.
            exclude: ^extra-addons/.*/(migrations|upgrades)/

    # 3) JSON Schema — GitHub Actions workflows
    - repo: https://github.com/sirosen/check-jsonschema
      rev: 0.30.0
      hooks:
          - id: check-github-workflows

    # 4) Prettier — formatting XML/JS/MD/JSON/YAML/CSS; config in .prettierrc.cjs.
    # repo: local + language: node — @prettier/plugin-xml plugin is loaded directly
    # from .prettierrc.cjs via require.resolve() (same approach as OCA), so no wrapper
    # or --plugin is needed on the CLI. mirrors-prettier is archived (deprecated).
    - repo: local
      hooks:
          - id: prettier
            name: prettier odoo xml views
            entry: prettier
            args: [--write, --list-different, --ignore-unknown]
            language: node
            additional_dependencies: &prettier_deps
                - "prettier@3.1.0"
                - "@prettier/plugin-xml@3.4.2"
            files: ^extra-addons/.*/(views|data|security|demo)/.*\.xml$
            exclude: ^extra-addons/.*/views/templates\.xml$
          - id: prettier
            name: prettier js static assets
            entry: prettier
            args: [--write, --list-different, --ignore-unknown]
            language: node
            additional_dependencies: *prettier_deps
            files: ^extra-addons/.*/static/.*\.js$
          - id: prettier
            name: prettier markdown docs
            alias: prettier-markdown-docs
            entry: prettier
            args: [--write, --list-different, --ignore-unknown]
            language: node
            additional_dependencies: *prettier_deps
            files: \.md$
          - id: prettier
            name: prettier json/yaml/css (first-party)
            entry: prettier
            args: [--write, --list-different, --ignore-unknown]
            language: node
            additional_dependencies: *prettier_deps
            files: ^(extra-addons|vendor-addons|tools|\.github)/.*\.(json|ya?ml|css|scss)$|^[^/]+\.(json|ya?ml)$
            exclude: ^.*\.min\.(css|js)$

    # 5) OCA odoo-pre-commit-hooks — Odoo-aware linter for XML and manifests
    - repo: https://github.com/OCA/odoo-pre-commit-hooks
      rev: v0.2.22
      hooks:
          - id: oca-checks-odoo-module
            files: ^extra-addons/.*(\.(csv|xml)$|/__manifest__\.py$|/__openerp__\.py$)
            args:
                - --disable=xml-header-wrong, xml-field-numeric-without-eval, xml-deprecated-data-node, xml-create-user-wo-reset-password, file-not-used, xml-field-bool-without-eval, xml-id-position-first, xml-view-dangerous-replace-low-priority, xml-dangerous-qweb-replace-low-priority

default_language_version:
    python: python3.12

# We do not format migrations and upgrade scripts with hooks (dynamically generated)
exclude: |
    (?x)^(
        bak-addons/.*|
        _local/.*|
        tests/e2e/.*|
        \.aigiscode/.*|
        \.pipeline/.*|
        screenshots/.*|
        .*\.min\.js|
        .*\.min\.css
    )$
